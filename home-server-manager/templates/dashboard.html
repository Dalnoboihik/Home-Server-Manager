<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Server Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .title-bar {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            color: #e0e0e0;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3a4a;
        }
        
        .title-bar h1 {
            font-size: 20px;
        }
        
        .tabs {
            display: flex;
            gap: 5px;
        }
        
        .tab {
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a3a4a;
            color: #c0c0c0;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .tab.active {
            background: #2c5f8a;
            color: white;
        }
        
        .logout-btn {
            background: #8b3a3a;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .section {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        
        .section.active {
            display: flex;
        }
        
        .navigation-bar {
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #c0c0c0;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .nav-btn:hover {
            background: #3a3a3a;
        }
        
        .address-bar {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 5px;
            padding: 8px 12px;
            font-family: monospace;
            display: flex;
            gap: 5px;
            color: #c0c0c0;
        }
        
        .address-bar input {
            flex: 1;
            border: none;
            background: none;
            font-family: monospace;
            font-size: 14px;
            outline: none;
            color: #e0e0e0;
        }
        
        .action-btn {
            background: #2c5f8a;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .action-btn:hover {
            background: #3a7aae;
        }
        
        .view-toggle {
            display: flex;
            gap: 5px;
        }
        
        .view-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #c0c0c0;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .view-btn.active {
            background: #2c5f8a;
            color: white;
        }
        
        .files-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #0f0f0f;
        }
        
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            padding: 10px;
        }
        
        .file-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .file-card:hover {
            background: #252525;
            border-color: #2c5f8a;
        }
        
        .file-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .file-name {
            font-size: 12px;
            word-break: break-all;
            color: #c0c0c0;
        }
        
        .files-table {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            margin: 10px;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 50px 1fr 120px 150px 100px;
            background: #252525;
            padding: 12px 15px;
            font-weight: bold;
            color: #e0e0e0;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 50px 1fr 120px 150px 100px;
            padding: 10px 15px;
            border-bottom: 1px solid #252525;
            align-items: center;
            cursor: pointer;
            color: #b0b0b0;
        }
        
        .table-row:hover {
            background: #252525;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
        }
        
        .info-card {
            background: #141414;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
        }
        
        .info-card h3 {
            margin-bottom: 15px;
            color: #2c5f8a;
            border-left: 3px solid #2c5f8a;
            padding-left: 10px;
        }
        
        .progress-bar {
            background: #2a2a2a;
            height: 25px;
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #2c5f8a, #3a7aae);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            transition: width 0.3s ease;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #252525;
        }
        
        .info-label {
            font-weight: bold;
            color: #a0a0a0;
        }
        
        .info-value {
            color: #e0e0e0;
            font-family: monospace;
        }
        
        .disk-list {
            margin-top: 10px;
        }
        
        .disk-item {
            padding: 8px;
            margin: 5px 0;
            background: #1a1a1a;
            border-radius: 5px;
        }
        
        .cpu-cores {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .core-bar {
            flex: 1;
            min-width: 35px;
            background: #2a2a2a;
            height: 50px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        
        .core-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #2c5f8a, #3a7aae);
            transition: height 0.3s ease;
        }
        
        .core-label {
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: white;
            z-index: 1;
        }
        
        .chart-card {
            background: #141414;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
            margin: 20px;
        }
        
        .chart-card h3 {
            margin-bottom: 15px;
            color: #2c5f8a;
        }
        
        .period-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .period-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #c0c0c0;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .period-btn.active {
            background: #2c5f8a;
            color: white;
        }
        
        canvas {
            max-height: 300px;
            width: 100%;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 10px;
            min-width: 350px;
            border: 1px solid #2a2a2a;
        }
        
        .modal-content h3 {
            margin-bottom: 15px;
            color: #e0e0e0;
        }
        
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #2a2a2a;
            border-radius: 5px;
            background: #252525;
            color: #e0e0e0;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #2c5f8a;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #808080;
        }
        
        @media (max-width: 768px) {
            .table-header, .table-row {
                grid-template-columns: 40px 1fr 80px;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="title-bar">
        <h1>🏠 Home Server Manager</h1>
        <div class="tabs">
            <button class="tab active" onclick="showTab('dashboard')">📊 Общие сведения</button>
            <button class="tab" onclick="showTab('files')">📁 Файлы</button>
            <button class="tab" onclick="showTab('charts')">📈 Графики</button>
            <button class="tab logout-btn" onclick="logout()">🚪 Выход</button>
        </div>
    </div>
    
    <div class="main-content">
        <div id="dashboard-section" class="section active">
            <div class="dashboard-grid" id="dashboardInfo">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
        
        <div id="files-section" class="section">
            <div class="navigation-bar">
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="goToRoot()">🏠</button>
                    <button class="nav-btn" onclick="goBack()">◀ Назад</button>
                    <button class="nav-btn" onclick="refreshFiles()">⟳</button>
                </div>
                <div class="address-bar">
                    <span>📂</span>
                    <input type="text" id="addressInput" placeholder="Введите путь" onkeypress="handleAddressEnter(event)">
                </div>
                <div class="action-buttons">
                    <button class="action-btn" onclick="showModal('folder')">📁 Папка</button>
                    <button class="action-btn" onclick="showModal('upload')">📤 Загрузить</button>
                    <button class="action-btn" onclick="showModal('uploadFolder')">📦 Загрузить папку</button>
                </div>
                <div class="view-toggle">
                    <button class="view-btn" id="gridViewBtn" onclick="setView('grid')">▦</button>
                    <button class="view-btn active" id="tableViewBtn" onclick="setView('table')">☷</button>
                </div>
            </div>
            <div class="files-container" id="filesContainer">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
        
        <div id="charts-section" class="section">
            <div class="chart-card">
                <h3>📈 Графики нагрузки</h3>
                <div class="period-selector">
                    <button class="period-btn active" onclick="changePeriod('1h')">1 час</button>
                    <button class="period-btn" onclick="changePeriod('24h')">24 часа</button>
                    <button class="period-btn" onclick="changePeriod('1w')">1 неделя</button>
                    <button class="period-btn" onclick="changePeriod('1m')">1 месяц</button>
                    <button class="period-btn" onclick="changePeriod('1y')">1 год</button>
                </div>
                <canvas id="cpuChart"></canvas>
                <canvas id="ramChart" style="margin-top: 30px;"></canvas>
            </div>
        </div>
    </div>
    
    <div id="folderModal" class="modal">
        <div class="modal-content">
            <h3>📁 Создать папку</h3>
            <input type="text" id="folderName" placeholder="Имя папки">
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="createFolder()">Создать</button>
                <button class="btn" onclick="closeModal('folderModal')">Отмена</button>
            </div>
        </div>
    </div>
    
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>📤 Загрузить файлы</h3>
            <input type="file" id="fileInput" multiple>
            <div id="uploadStatus" style="margin-top: 10px;"></div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="uploadFiles()">Загрузить</button>
                <button class="btn" onclick="closeModal('uploadModal')">Отмена</button>
            </div>
        </div>
    </div>
    
    <div id="uploadFolderModal" class="modal">
        <div class="modal-content">
            <h3>📦 Загрузить папку</h3>
            <input type="file" id="folderInput" webkitdirectory directory multiple>
            <div id="folderUploadStatus" style="margin-top: 10px;"></div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="uploadFolder()">Загрузить</button>
                <button class="btn" onclick="closeModal('uploadFolderModal')">Отмена</button>
            </div>
        </div>
    </div>
    
    <div id="renameModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Переименовать</h3>
            <input type="text" id="newName" placeholder="Новое имя">
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="renameItem()">Переименовать</button>
                <button class="btn" onclick="closeModal('renameModal')">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentPath = '';
        let historyStack = [];
        let currentView = 'table';
        let renamePath = '';
        let cpuChart = null;
        let ramChart = null;
        let currentPeriod = '1h';
        let updateInterval = null;
        
        function initCharts() {
            const ctx1 = document.getElementById('cpuChart').getContext('2d');
            const ctx2 = document.getElementById('ramChart').getContext('2d');
            
            cpuChart = new Chart(ctx1, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'CPU %', data: [], borderColor: '#2c5f8a', backgroundColor: 'rgba(44,95,138,0.1)', tension: 0.4, fill: true }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#e0e0e0' } } }, scales: { y: { min: 0, max: 100, grid: { color: '#2a2a2a' }, ticks: { color: '#c0c0c0' } }, x: { ticks: { color: '#c0c0c0', maxRotation: 45, minRotation: 45 } } } }
            });
            
            ramChart = new Chart(ctx2, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'RAM %', data: [], borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.1)', tension: 0.4, fill: true }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#e0e0e0' } } }, scales: { y: { min: 0, max: 100, grid: { color: '#2a2a2a' }, ticks: { color: '#c0c0c0' } }, x: { ticks: { color: '#c0c0c0', maxRotation: 45, minRotation: 45 } } } }
            });
        }
        
        async function loadHistory() {
            try {
                const response = await fetch(`/api/history?period=${currentPeriod}`);
                const data = await response.json();
                const timestamps = data.timestamps.map(ts => new Date(ts).toLocaleString());
                
                cpuChart.data.labels = timestamps;
                cpuChart.data.datasets[0].data = data.cpu;
                cpuChart.update();
                
                ramChart.data.labels = timestamps;
                ramChart.data.datasets[0].data = data.ram;
                ramChart.update();
            } catch(e) {
                console.error('History error:', e);
            }
        }
        
        function changePeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadHistory();
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch('/api/system');
                const data = await response.json();
                
                let coresHtml = '<div class="cpu-cores">';
                if (data.cpu.per_core) {
                    data.cpu.per_core.forEach(core => {
                        coresHtml += `<div class="core-bar"><div class="core-fill" style="height: ${core}%"></div><div class="core-label">${core}%</div></div>`;
                    });
                }
                coresHtml += '</div>';
                
                let disksHtml = '<div class="disk-list">';
                if (data.disks) {
                    data.disks.forEach(disk => {
                        disksHtml += `
                            <div class="disk-item">
                                <div><strong>💾 ${disk.mountpoint}</strong></div>
                                <div>${disk.used_formatted} / ${disk.total_formatted}</div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${disk.percent}%">${disk.percent}%</div></div>
                            </div>
                        `;
                    });
                }
                disksHtml += '</div>';
                
                document.getElementById('dashboardInfo').innerHTML = `
                    <div class="info-card">
                        <h3>💻 Процессор</h3>
                        <div class="info-row"><span class="info-label">Модель:</span><span class="info-value">${data.cpu.name}</span></div>
                        <div class="info-row"><span class="info-label">Физические ядра:</span><span class="info-value">${data.cpu.physical_cores}</span></div>
                        <div class="info-row"><span class="info-label">Логические ядра (потоки):</span><span class="info-value">${data.cpu.logical_cores}</span></div>
                        <div class="info-row"><span class="info-label">Общая загрузка:</span><span class="info-value"><strong>${data.cpu.percent}%</strong></span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${data.cpu.percent}%">${data.cpu.percent}%</div></div>
                        <div class="info-row"><span class="info-label">Загрузка по ядрам:</span></div>
                        ${coresHtml}
                    </div>
                    <div class="info-card">
                        <h3>🧠 Оперативная память</h3>
                        <div class="info-row"><span class="info-label">Всего:</span><span class="info-value">${data.memory.total_formatted}</span></div>
                        <div class="info-row"><span class="info-label">Использовано:</span><span class="info-value"><strong>${data.memory.used_formatted}</strong></span></div>
                        <div class="info-row"><span class="info-label">Свободно:</span><span class="info-value">${data.memory.free_formatted}</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${data.memory.percent}%">${data.memory.percent}%</div></div>
                    </div>
                    <div class="info-card">
                        <h3>💾 Диски</h3>
                        ${disksHtml}
                    </div>
                    <div class="info-card">
                        <h3>🌐 Сеть</h3>
                        <div class="info-row"><span class="info-label">Отправлено:</span><span class="info-value">${data.network.sent_formatted}</span></div>
                        <div class="info-row"><span class="info-label">Получено:</span><span class="info-value">${data.network.recv_formatted}</span></div>
                    </div>
                    <div class="info-card">
                        <h3>ℹ️ Система</h3>
                        <div class="info-row"><span class="info-label">Хост:</span><span class="info-value">${data.system.hostname}</span></div>
                        <div class="info-row"><span class="info-label">ОС:</span><span class="info-value">${data.system.os}</span></div>
                        <div class="info-row"><span class="info-label">Время работы с:</span><span class="info-value">${data.system.boot_time}</span></div>
                        <div class="info-row"><span class="info-label">Обновлено:</span><span class="info-value">${new Date(data.timestamp).toLocaleTimeString()}</span></div>
                    </div>
                `;
            } catch(e) {
                console.error('Dashboard error:', e);
            }
        }
        
        function showTab(tab) {
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }
            
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(tab + '-section').classList.add('active');
            
            if (tab === 'dashboard') {
                loadDashboard();
                updateInterval = setInterval(loadDashboard, 2000); // Обновление главной информации каждые 2 сек
            } else if (tab === 'files') {
                if (currentPath === '') {
                    loadRoot();
                } else {
                    loadFiles(currentPath);
                }
            } else if (tab === 'charts') {
                if (!cpuChart) initCharts();
                loadHistory();
                updateInterval = setInterval(loadHistory, 30000); // Обновление графиков каждые 30 сек
            }
        }
        
        async function loadRoot() {
            currentPath = '';
            loadFiles('');
        }
        
        function goToRoot() {
            historyStack = [];
            loadRoot();
        }
        
        async function loadFiles(path) {
            const container = document.getElementById('filesContainer');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch('/api/files?path=' + encodeURIComponent(path));
                const data = await response.json();
                
                if (response.ok) {
                    if (data.is_root) {
                        currentPath = '';
                        document.getElementById('addressInput').value = 'Этот компьютер';
                        renderDrives(data.items);
                    } else {
                        currentPath = data.current_path;
                        document.getElementById('addressInput').value = currentPath;
                        window.parentPath = data.parent_path;
                        renderFiles(data.items);
                    }
                } else {
                    container.innerHTML = '<div class="loading">❌ Ошибка: ' + (data.error || 'Неизвестная ошибка') + '</div>';
                }
            } catch(e) {
                container.innerHTML = '<div class="loading">❌ Ошибка соединения</div>';
            }
        }
        
        function renderDrives(drives) {
            const container = document.getElementById('filesContainer');
            container.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'files-grid';
            
            drives.forEach(drive => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.onclick = () => {
                    historyStack.push(currentPath);
                    loadFiles(drive.name);
                };
                card.innerHTML = `
                    <div class="file-icon">💽</div>
                    <div class="file-name">${drive.name}</div>
                    <div style="font-size:10px;">${drive.free_formatted}<br>из ${drive.size_formatted}</div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(grid);
        }
        
        function renderFiles(files) {
            const container = document.getElementById('filesContainer');
            container.innerHTML = '';
            
            if (files.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:50px;">📁 Папка пуста</div>';
                return;
            }
            
            if (currentView === 'grid') {
                const grid = document.createElement('div');
                grid.className = 'files-grid';
                
                files.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'file-card';
                    const icon = file.type === 'directory' ? '📁' : getFileIcon(file.name);
                    const safePath = file.path.replace(/\\/g, '\\\\');
                    
                    card.innerHTML = `
                        <div class="file-icon">${icon}</div>
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div style="font-size:10px;">${file.size_formatted || ''}</div>
                        <div style="margin-top:8px;">
                            <button class="btn" style="font-size:11px;padding:2px 6px;" onclick="event.stopPropagation(); showRename('${safePath}', '${escapeHtml(file.name)}')">✏️</button>
                            <button class="btn" style="background:#8b3a3a;font-size:11px;padding:2px 6px;" onclick="event.stopPropagation(); deleteItem('${safePath}')">🗑️</button>
                        </div>
                    `;
                    
                    if (file.type === 'directory') {
                        card.onclick = () => {
                            historyStack.push(currentPath);
                            loadFiles(file.path);
                        };
                    } else {
                        card.onclick = () => downloadFile(file.path);
                    }
                    
                    grid.appendChild(card);
                });
                container.appendChild(grid);
            } else {
                const table = document.createElement('div');
                table.className = 'files-table';
                table.innerHTML = `
                    <div class="table-header">
                        <div></div>
                        <div>Имя</div>
                        <div>Размер</div>
                        <div>Дата</div>
                        <div>Действия</div>
                    </div>
                `;
                
                files.forEach(file => {
                    const row = document.createElement('div');
                    row.className = 'table-row';
                    const icon = file.type === 'directory' ? '📁' : getFileIcon(file.name);
                    const safePath = file.path.replace(/\\/g, '\\\\');
                    
                    row.innerHTML = `
                        <div>${icon}</div>
                        <div style="color: ${file.type === 'directory' ? '#2c5f8a' : '#b0b0b0'}; font-weight: ${file.type === 'directory' ? 'bold' : 'normal'}">${escapeHtml(file.name)}</div>
                        <div>${file.size_formatted || '-'}</div>
                        <div>${file.modified || '-'}</div>
                        <div>
                            <button class="btn" style="font-size:12px;padding:2px 8px;" onclick="event.stopPropagation(); downloadFile('${safePath}')">⬇️</button>
                            <button class="btn" style="font-size:12px;padding:2px 8px;" onclick="event.stopPropagation(); showRename('${safePath}', '${escapeHtml(file.name)}')">✏️</button>
                            <button class="btn" style="background:#8b3a3a;font-size:12px;padding:2px 8px;" onclick="event.stopPropagation(); deleteItem('${safePath}')">🗑️</button>
                        </div>
                    `;
                    
                    if (file.type === 'directory') {
                        row.onclick = () => {
                            historyStack.push(currentPath);
                            loadFiles(file.path);
                        };
                    } else {
                        row.onclick = () => downloadFile(file.path);
                    }
                    
                    table.appendChild(row);
                });
                container.appendChild(table);
            }
        }
        
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                'mp4': '🎬', 'avi': '🎬', 'mkv': '🎬',
                'mp3': '🎵', 'wav': '🎵', 'flac': '🎵',
                'pdf': '📄', 'doc': '📝', 'docx': '📝', 'xls': '📊',
                'zip': '📦', 'rar': '📦', '7z': '📦',
                'py': '🐍', 'js': '⚡', 'html': '🌐', 'css': '🎨',
                'exe': '⚙️', 'txt': '📃'
            };
            return icons[ext] || '📄';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function goBack() {
            if (historyStack.length > 0) {
                loadFiles(historyStack.pop());
            } else if (currentPath) {
                loadRoot();
            }
        }
        
        function refreshFiles() {
            if (currentPath === '') {
                loadRoot();
            } else {
                loadFiles(currentPath);
            }
        }
        
        function handleAddressEnter(event) {
            if (event.key === 'Enter') {
                const path = event.target.value;
                if (path && path !== 'Этот компьютер') {
                    historyStack.push(currentPath);
                    loadFiles(path);
                }
            }
        }
        
        function setView(view) {
            currentView = view;
            document.getElementById('gridViewBtn').classList.remove('active');
            document.getElementById('tableViewBtn').classList.remove('active');
            document.getElementById(view + 'ViewBtn').classList.add('active');
            refreshFiles();
        }
        
        function showModal(type) {
            if (type === 'folder') {
                document.getElementById('folderName').value = '';
                document.getElementById('folderModal').style.display = 'flex';
            } else if (type === 'upload') {
                document.getElementById('fileInput').value = '';
                document.getElementById('uploadStatus').innerHTML = '';
                document.getElementById('uploadModal').style.display = 'flex';
            } else if (type === 'uploadFolder') {
                document.getElementById('folderInput').value = '';
                document.getElementById('folderUploadStatus').innerHTML = '';
                document.getElementById('uploadFolderModal').style.display = 'flex';
            }
        }
        
        async function createFolder() {
            const name = document.getElementById('folderName').value.trim();
            if (!name) {
                alert('Введите имя папки');
                return;
            }
            
            try {
                const response = await fetch('/api/mkdir', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path: currentPath, dirname: name})
                });
                
                if (response.ok) {
                    closeModal('folderModal');
                    refreshFiles();
                } else {
                    const data = await response.json();
                    alert('Ошибка: ' + data.error);
                }
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        async function uploadFiles() {
            const files = document.getElementById('fileInput').files;
            if (files.length === 0) {
                alert('Выберите файлы');
                return;
            }
            
            if (!currentPath) {
                alert('Сначала выберите папку');
                return;
            }
            
            const statusDiv = document.getElementById('uploadStatus');
            let success = 0;
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const formData = new FormData();
                formData.append('file', file);
                formData.append('path', currentPath);
                
                statusDiv.innerHTML = `⏳ ${file.name} (${i+1}/${files.length})...`;
                
                try {
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok && result.success) {
                        success++;
                        statusDiv.innerHTML = `✅ ${file.name}`;
                    } else {
                        statusDiv.innerHTML = `❌ ${file.name} - ${result.error}`;
                    }
                } catch(error) {
                    statusDiv.innerHTML = `❌ ${file.name} - ${error.message}`;
                }
                
                await new Promise(r => setTimeout(r, 200));
            }
            
            statusDiv.innerHTML = `✅ Загружено: ${success} из ${files.length}`;
            setTimeout(() => {
                closeModal('uploadModal');
                refreshFiles();
            }, 1500);
        }
        
        async function uploadFolder() {
            const files = document.getElementById('folderInput').files;
            if (files.length === 0) {
                alert('Выберите папку');
                return;
            }
            
            if (!currentPath) {
                alert('Сначала выберите папку назначения');
                return;
            }
            
            const statusDiv = document.getElementById('folderUploadStatus');
            const formData = new FormData();
            formData.append('path', currentPath);
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const relativePath = file.webkitRelativePath;
                formData.append('files[]', file, relativePath);
            }
            
            statusDiv.innerHTML = '⏳ Загрузка папки...';
            
            try {
                const response = await fetch('/api/upload-folder', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    statusDiv.innerHTML = `✅ ${result.message}`;
                    setTimeout(() => {
                        closeModal('uploadFolderModal');
                        refreshFiles();
                    }, 1500);
                } else {
                    statusDiv.innerHTML = `❌ Ошибка: ${result.error}`;
                }
            } catch(error) {
                statusDiv.innerHTML = `❌ Ошибка: ${error.message}`;
            }
        }
        
        function showRename(path, name) {
            renamePath = path;
            document.getElementById('newName').value = name;
            document.getElementById('renameModal').style.display = 'flex';
        }
        
        async function renameItem() {
            const newName = document.getElementById('newName').value.trim();
            if (!newName) {
                alert('Введите новое имя');
                return;
            }
            
            try {
                const response = await fetch('/api/rename', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({old_path: renamePath, new_name: newName})
                });
                
                if (response.ok) {
                    closeModal('renameModal');
                    refreshFiles();
                } else {
                    const data = await response.json();
                    alert('Ошибка: ' + data.error);
                }
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        async function deleteItem(path) {
            if (!confirm('🗑️ Удалить этот элемент?\n\nЭто действие нельзя отменить!')) {
                return;
            }
            
            try {
                const response = await fetch('/api/delete', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path: path})
                });
                
                if (response.ok) {
                    refreshFiles();
                } else {
                    const data = await response.json();
                    alert('Ошибка: ' + data.error);
                }
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        function downloadFile(path) {
            window.location.href = '/api/download?path=' + encodeURIComponent(path);
        }
        
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        
        async function logout() {
            await fetch('/logout');
            window.location.href = '/login';
        }
        
        window.onclick = function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        };
        
        loadDashboard();
        updateInterval = setInterval(loadDashboard, 2000); // Обновление каждые 2 сек
    </script>
</body>
</html>
